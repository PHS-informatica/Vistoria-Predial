<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - PHS Data & Tech</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <header class="login-header">
                <h2>🔐 Acesso ao Sistema</h2>
                <p>Insira suas credenciais</p>
            </header>

            <form action="/login" method="POST">
                <div class="form-group">
                    <label>Usuário:</label>
                    <input type="text" name="usuario" required placeholder="Digite seu usuário">
                </div>
                <div class="form-group" style="margin-top: 15px;">
                    <label>Senha:</label>
                    <input type="password" name="senha" required placeholder="Digite sua senha">
                </div>

                {% if erro %}
                    <p class="msg-erro" style="color: #e74c3c; font-size: 0.9em; margin-top: 10px;">
                        ⚠️ {{ erro }}
                    </p>
                {% endif %}

                <button type="submit" class="btn-login">Entrar</button>
            </form>
            
            <footer class="login-footer">
                &copy; 2026 PHS Data & Tech
            </footer>
        </div>
    </div>
</body>
</html>
